name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Extractors (SAE, VQ-VAE, FSQ, new backend)
        - Discovery (BitDiscovery, duals, triadic)
        - Visualization
        - CLI
        - Performance
        - Other
    validations:
      required: true
